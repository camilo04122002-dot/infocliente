<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CuentaClientes – Johan Plata</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f5f5f3;--bg2:#fff;--bg3:#f0f0ee;--text:#1a1a18;--text2:#555;--text3:#888;--border:#e0e0dc;--green:#1D9E75;--green-light:#EAF3DE;--green-dark:#27500A;--red:#A32D2D;--red-light:#FCEBEB;--blue-light:#E6F1FB;--blue-dark:#0C447C;--amber-light:#FAEEDA;--amber-dark:#633806;--purple-light:#EEEDFE;--purple-dark:#3C3489;--shadow:0 2px 12px rgba(0,0,0,0.06)}
body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
body.dark{--bg:#1a1a18;--bg2:#2a2a28;--bg3:#333331;--text:#f0f0ee;--text2:#ccc;--text3:#999;--border:#444}
.header{background:var(--bg2);border-bottom:0.5px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:var(--shadow)}
.header img{height:48px;width:48px;object-fit:contain;border-radius:50%;cursor:pointer;border:1.5px solid var(--border)}
.header-name{font-size:14px;font-weight:600;letter-spacing:0.5px}
.header-sub{font-size:10px;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase}
.nav{display:flex;gap:4px;margin-left:16px;flex-wrap:wrap}
.nav-btn{padding:6px 12px;border-radius:20px;font-size:12px;border:0.5px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;transition:all 0.15s;white-space:nowrap}
.nav-btn:hover{background:var(--bg3);color:var(--text)}
.nav-btn.active{background:var(--green);color:#fff;border-color:var(--green)}
.app{max-width:960px;margin:0 auto;padding:1.5rem 1rem}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
.login-box{background:var(--bg2);border-radius:16px;border:0.5px solid var(--border);padding:2.5rem 2rem;width:100%;max-width:380px;text-align:center;box-shadow:var(--shadow)}
.login-logo{width:90px;height:90px;object-fit:contain;border-radius:50%;margin-bottom:12px;border:2px solid var(--border)}
.login-name{font-size:17px;font-weight:600;letter-spacing:1px;margin-bottom:2px}
.login-sub{font-size:11px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-bottom:24px}
.login-err{font-size:12px;color:var(--red);margin-bottom:10px;min-height:18px}
input,select,textarea{width:100%;padding:8px 10px;font-size:13px;border-radius:7px;border:0.5px solid var(--border);background:var(--bg2);color:var(--text);font-family:inherit;outline:none;transition:border 0.15s}
input:focus,select:focus,textarea:focus{border-color:var(--green);box-shadow:0 0 0 2px #1D9E7520}
textarea{resize:vertical;min-height:70px}
button{font-family:inherit;cursor:pointer}
.btn{padding:7px 16px;border-radius:8px;font-size:13px;border:0.5px solid var(--border);background:var(--bg3);color:var(--text)}
.btn:hover{background:var(--border)}
.btn-green{background:var(--green);color:#fff;border:none;font-weight:500}
.btn-green:hover{opacity:0.9}
.btn-red{background:var(--red-light);color:var(--red);border:none}
.btn-icon{background:none;border:none;font-size:16px;padding:2px 6px;color:var(--text3)}
.badge{font-size:11px;padding:2px 8px;border-radius:6px;font-weight:500;display:inline-block}
.badge-activo,.badge-vigente,.badge-entregado,.badge-pagado{background:var(--green-light);color:var(--green-dark)}
.badge-inactivo{background:var(--bg3);color:var(--text3)}
.badge-pendiente{background:var(--amber-light);color:var(--amber-dark)}
.badge-vencido{background:var(--red-light);color:var(--red)}
.badge-presentado{background:var(--blue-light);color:var(--blue-dark)}
.badge-tipo{background:var(--bg3);color:var(--text3);font-size:11px;padding:2px 8px;border-radius:6px}
.badge-mensual{background:var(--purple-light);color:var(--purple-dark)}
.card{background:var(--bg2);border-radius:10px;border:0.5px solid var(--border);padding:12px 14px;margin-bottom:10px}
.metric-card{background:var(--bg2);border-radius:12px;border:0.5px solid var(--border);padding:14px 16px;box-shadow:var(--shadow)}
.section-title{font-size:13px;font-weight:500;margin-bottom:8px}
.lbl{font-size:11px;color:var(--text3);margin-bottom:3px}
.val{font-size:13px;font-weight:500}
.row{display:flex;gap:8px;align-items:center;background:var(--bg3);border-radius:8px;padding:8px 10px;margin-bottom:6px;flex-wrap:wrap}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.client-row{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:10px;border:0.5px solid var(--border);margin-bottom:8px;cursor:pointer;background:var(--bg2);transition:all 0.12s}
.client-row:hover{background:var(--bg3);transform:translateX(2px)}
.avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:600;flex-shrink:0}
.avatar-empresa{background:var(--blue-light);color:var(--blue-dark)}
.avatar-natural{background:var(--green-light);color:var(--green-dark)}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.search-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.search-row input{flex:1;min-width:180px}
.section-label{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:8px;margin-top:4px}
.empty{text-align:center;padding:3rem 0;color:var(--text3)}
.pass-wrap{position:relative;flex:2}
.pass-wrap input{padding-right:30px}
.pass-eye{position:absolute;right:8px;top:50%;transform:translateY(-50%);cursor:pointer;font-size:14px;background:none;border:none;color:var(--text3)}
.back-btn{background:none;border:none;font-size:20px;cursor:pointer;color:var(--text3);margin-right:8px}
.detail-header{display:flex;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.doc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:8px;margin-bottom:14px}
.doc-card{background:var(--bg2);border-radius:10px;border:0.5px solid var(--border);padding:10px 12px}
.toast{position:fixed;bottom:24px;right:24px;background:#1a1a18;color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;z-index:9999;opacity:0;transition:opacity 0.3s;max-width:280px}
.toast.show{opacity:1}
.alert-banner{background:var(--amber-light);border:0.5px solid #FAC775;border-radius:10px;padding:10px 14px;margin-bottom:8px;font-size:12px;color:var(--amber-dark)}
.alert-banner.danger{background:var(--red-light);border-color:#F09595;color:var(--red)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-top:8px}
.cal-day{min-height:70px;background:var(--bg2);border-radius:6px;border:0.5px solid var(--border);padding:4px}
.cal-day.today{border-color:var(--green);background:var(--green-light)}
.cal-day.other-month{opacity:0.4}
.cal-header{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:4px}
.cal-header span{text-align:center;font-size:11px;font-weight:600;color:var(--text3);padding:4px 0}
.cal-event{background:var(--amber-light);color:var(--amber-dark);border-radius:3px;padding:1px 4px;margin-top:2px;font-size:10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cal-event.vence{background:var(--red-light);color:var(--red)}
.upload-area{border:1.5px dashed var(--border);border-radius:8px;padding:10px;text-align:center;font-size:12px;color:var(--text3);cursor:pointer;display:block;transition:all 0.15s}
.upload-area:hover{border-color:var(--green);color:var(--green)}
.dark-btn{background:none;border:0.5px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;color:var(--text3);cursor:pointer}
.tag{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:500;margin:2px;background:var(--blue-light);color:var(--blue-dark)}
.pago-chip{display:inline-flex;align-items:center;gap:4px;background:var(--green-light);padding:3px 8px;border-radius:6px;margin:2px}
.pago-chip span{font-size:11px;color:var(--green-dark);font-weight:500}
.pago-chip button{background:none;border:none;cursor:pointer;font-size:10px;color:var(--red);padding:0}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:1rem}
.modal{background:var(--bg2);border-radius:16px;padding:1.5rem;width:100%;max-width:520px;max-height:90vh;overflow-y:auto}
.modal h3{font-size:15px;font-weight:600;margin-bottom:16px}
/* MOBILE */
@media(max-width:700px){
  .grid2,.grid3,.grid4{grid-template-columns:1fr}
  .nav{gap:2px}
  .nav-btn{padding:5px 8px;font-size:11px}
  .header{padding:8px 10px;flex-wrap:wrap}
  .header .nav{margin-left:0;margin-top:6px;width:100%}
  .topbar{flex-direction:column;align-items:flex-start}
  .search-row{flex-direction:column}
  .detail-header{flex-wrap:wrap}
  .doc-grid{grid-template-columns:1fr 1fr}
  .cal-day{min-height:50px}
  .cal-event{display:none}
}
/* PDF PRINT */
.pdf-report{font-family:Georgia,serif;color:#111;background:#fff;padding:20px}
.pdf-header{text-align:center;border-bottom:2px solid #1D9E75;padding-bottom:16px;margin-bottom:20px}
.pdf-header img{width:80px;height:80px;object-fit:contain;border-radius:50%;margin-bottom:8px}
.pdf-cliente{border:1px solid #e0e0dc;border-radius:8px;padding:12px;margin-bottom:12px;page-break-inside:avoid}
.pdf-tabla{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px}
.pdf-tabla th{background:#1D9E75;color:#fff;padding:6px 8px;text-align:left}
.pdf-tabla td{padding:5px 8px;border-bottom:1px solid #eee}
.pdf-tabla tr:nth-child(even) td{background:#f9f9f7}
</style>
</head>
<body>
<div id="root"><div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#888;font-size:14px">⏳ Cargando...</div></div>
<div class="toast" id="toast"></div>
<div id="modalContainer"></div>
<input type="file" id="logoFileInput" accept="image/*" style="display:none" onchange="logoSeleccionado(this)"/>
<input type="file" id="reportLogoInput" accept="image/*" style="display:none" onchange="reportLogoSeleccionado(this)"/>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

const firebaseConfig={apiKey:"AIzaSyBBf9HzSrHyVUSedRoim7jnWNwZdhh_DcE",authDomain:"datosclientes-68f19.firebaseapp.com",projectId:"datosclientes-68f19",storageBucket:"datosclientes-68f19.firebasestorage.app",messagingSenderId:"94517215130",appId:"1:94517215130:web:7c8b17976b122331ed8423"};
const fbApp=initializeApp(firebaseConfig);
const auth=getAuth(fbApp);
const db=getFirestore(fbApp);
const storage=getStorage(fbApp);

// ── LOGO & DARK ──────────────────────────────────────────────────
const LOGO_DEFAULT="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='47' fill='none' stroke='%23222' stroke-width='2'/%3E%3Ccircle cx='50' cy='50' r='43' fill='none' stroke='%23222' stroke-width='0.8'/%3E%3Ctext x='50' y='58' text-anchor='middle' font-size='36' font-family='Georgia,serif' fill='%23222'%3EJP%3C/text%3E%3C/svg%3E";
let logoSrc=localStorage.getItem("jp_logo")||LOGO_DEFAULT;
let darkMode=localStorage.getItem("jp_dark")==="1";
if(darkMode)document.body.classList.add("dark");

window.cambiarLogo=()=>document.getElementById("logoFileInput").click();
window.logoSeleccionado=(inp)=>{
  const file=inp.files[0];if(!file)return;
  const r=new FileReader();r.onload=e=>{localStorage.setItem("jp_logo",e.target.result);logoSrc=e.target.result;render();toast("✅ Logo actualizado")};
  r.readAsDataURL(file);inp.value="";
};
window.toggleDark=()=>{darkMode=!darkMode;localStorage.setItem("jp_dark",darkMode?"1":"0");document.body.classList.toggle("dark",darkMode);render();};

// ── REPORTE LOGO ─────────────────────────────────────────────────
let reportLogoSrc=localStorage.getItem("jp_report_logo")||logoSrc;
window.reportLogoSeleccionado=(inp)=>{
  const file=inp.files[0];if(!file)return;
  const r=new FileReader();r.onload=e=>{localStorage.setItem("jp_report_logo",e.target.result);reportLogoSrc=e.target.result;toast("✅ Logo del reporte actualizado")};
  r.readAsDataURL(file);inp.value="";
};

// ── CONSTANTES ───────────────────────────────────────────────────
const DOCS_PRED=["Cédula de ciudadanía","RUT","Cámara de comercio","Certificado bancario","Certificado de ingresos","Declaración de renta","Contrato de arrendamiento","Escritura pública","Pasaporte / visa","Estados de cuenta bancarios"];
const OBLIG_LIST=["IVA bimestral","IVA cuatrimestral","IVA anual","Retención en la fuente","Autorretención","Renta personas naturales","Renta personas jurídicas","Industria y comercio","Avisos y tableros","Impuesto predial","Impuesto de vehículos","Declaración de activos en el exterior","Medios magnéticos (exógena)","Parafiscales / PILA","Nómina electrónica","Facturación electrónica","ICA régimen simplificado","Impuesto al patrimonio","Otro"];
const DOC_EST=["pendiente","vigente","vencido","no aplica"];
const OBLIG_EST=["pendiente","presentado","vencido"];
const PERIODOS=["mensual","bimestral","cuatrimestral","semestral","anual","única vez"];
const CATEGORIAS=["Comerciante","Empleado","Empresa SAS","Empresa LTDA","Rentista","Profesional independiente","Pensionado","Otro"];
const DIAS=["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];
const MESES_N=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];

// ── ESTADO ───────────────────────────────────────────────────────
let S={vista:"dashboard",clientes:[],seleccionado:null,busqueda:"",filtroTipo:"todos",user:null,loginErr:"",loginLoad:false,calMes:new Date().getMonth(),calAnio:new Date().getFullYear(),formDirty:false};
let unsubClientes=null;
let formData=null;

function setState(p){Object.assign(S,p);render();}
function toast(msg,ms=2800){const el=document.getElementById("toast");el.textContent=msg;el.classList.add("show");setTimeout(()=>el.classList.remove("show"),ms);}
function escH(s){return(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function escA(s){return(s||"").replace(/"/g,"&quot;").replace(/'/g,"&#39;")}
function badge(e){return`<span class="badge badge-${(e||"").replace(/\s/g,"")}">${e||""}</span>`}
function avatar(c){return`<div class="avatar ${c.tipo==="empresa"?"avatar-empresa":"avatar-natural"}">${c.nombre?c.nombre[0].toUpperCase():"?"}</div>`}
function hoy(){return new Date().toISOString().slice(0,10)}
function diasHasta(f){if(!f)return 999;return Math.ceil((new Date(f)-new Date(hoy()))/(864e5))}

// ── AUTH ─────────────────────────────────────────────────────────
onAuthStateChanged(auth,user=>{
  if(user){
    S.user=user;
    if(!unsubClientes){
      unsubClientes=onSnapshot(collection(db,"clientes"),snap=>{
        S.clientes=snap.docs.map(d=>({...d.data(),_id:d.id}));render();
      });
    }
    if(S.vista==="login")setState({vista:"dashboard"});else render();
  }else{
    S.user=null;if(unsubClientes){unsubClientes();unsubClientes=null;}
    setState({vista:"login",clientes:[]});
  }
});

window.doLogin=async()=>{
  const email=document.getElementById("lEmail").value.trim();
  const pass=document.getElementById("lPass").value;
  if(!email||!pass){setState({loginErr:"Completa todos los campos."});return;}
  setState({loginLoad:true,loginErr:""});
  try{await signInWithEmailAndPassword(auth,email,pass);}
  catch(e){setState({loginLoad:false,loginErr:"Correo o contraseña incorrectos."});}
};
window.doLogout=async()=>{if(!confirm("¿Cerrar sesión?"))return;await signOut(auth);};
window.recuperarPassword=async()=>{
  const email=document.getElementById("lEmail").value.trim();
  if(!email){setState({loginErr:"Escribe tu correo primero."});return;}
  try{
    await sendPasswordResetEmail(auth,email);
    setState({loginErr:""});
    document.getElementById("lEmail").value="";
    alert("✅ Te enviamos un correo para restablecer tu contraseña. Revisa tu bandeja.");
  }catch(e){setState({loginErr:"No se pudo enviar el correo. Verifica tu dirección."});}
};

// ── FIRESTORE ────────────────────────────────────────────────────
async function saveCliente(c){
  const{_id,...data}=c;
  const ts=new Date().toISOString();
  data.historial=[...(c.historial||[]),{fecha:ts,accion:_id?"Actualizado":"Creado"}].slice(-20);
  if(_id){await updateDoc(doc(db,"clientes",_id),data);}
  else{const r=await addDoc(collection(db,"clientes"),data);c._id=r.id;}
  S.formDirty=false;
  toast("✅ Cliente guardado");setState({seleccionado:c,vista:"detalle"});
}
async function deleteCliente(id){
  await deleteDoc(doc(db,"clientes",id));
  toast("🗑 Cliente eliminado");setState({vista:"lista",seleccionado:null});
}

// ── STORAGE ──────────────────────────────────────────────────────
window.subirArchivoDoc=async(cid,di,inp)=>{
  const file=inp.files[0];if(!file)return;
  toast("⏳ Subiendo...");
  const path=`clientes/${cid}/docs/${Date.now()}_${file.name}`;
  await uploadBytes(ref(storage,path),file);
  const url=await getDownloadURL(ref(storage,path));
  const c=S.clientes.find(x=>x._id===cid);
  const docs=[...(c.documentos||[])];
  docs[di]={...docs[di],archivoUrl:url,archivoPath:path,estado:"vigente"};
  await updateDoc(doc(db,"clientes",cid),{documentos:docs});
  toast("✅ Documento adjuntado");inp.value="";
};
window.eliminarArchivoDoc=async(cid,di,path)=>{
  if(!confirm("¿Eliminar archivo adjunto?"))return;
  try{await deleteObject(ref(storage,path));}catch(e){}
  const c=S.clientes.find(x=>x._id===cid);
  const docs=[...(c.documentos||[])];
  docs[di]={...docs[di],archivoUrl:"",archivoPath:"",estado:"pendiente"};
  await updateDoc(doc(db,"clientes",cid),{documentos:docs});
  toast("🗑 Archivo eliminado");
};

// ── HONORARIOS ───────────────────────────────────────────────────
window.agregarHonorario=async(cid)=>{
  const concepto=prompt("Concepto (ej: Contabilidad mensual):");if(!concepto)return;
  const valor=prompt("Valor en pesos:");if(!valor)return;
  const frecuencia=prompt("Frecuencia (mensual/bimestral/trimestral/anual/única vez):")||"mensual";
  const c=S.clientes.find(x=>x._id===cid);
  const honorarios=[...(c.honorarios||[]),{concepto,valor:parseFloat((valor||"0").replace(/\D/g,""))||0,frecuencia,fecha:hoy(),estado:"pendiente",pagos:[]}];
  await updateDoc(doc(db,"clientes",cid),{honorarios});
  toast("✅ Honorario registrado");
};
window.registrarPagoMes=async(cid,hi)=>{
  const mes=prompt("¿Qué mes registrar como pagado?\nEjemplo: Junio 2025");if(!mes)return;
  const c=S.clientes.find(x=>x._id===cid);
  const h=[...(c.honorarios||[])];
  const pagos=[...(h[hi].pagos||[])];
  if(pagos.find(p=>p.mes===mes)){toast("⚠️ Ese mes ya está registrado");return;}
  pagos.push({mes,fecha:hoy()});
  h[hi]={...h[hi],pagos,estado:"pagado"};
  await updateDoc(doc(db,"clientes",cid),{honorarios:h});
  toast("✅ "+mes+" registrado como pagado");
};
window.eliminarPagoMes=async(cid,hi,mi)=>{
  if(!confirm("¿Eliminar este pago?"))return;
  const c=S.clientes.find(x=>x._id===cid);
  const h=[...(c.honorarios||[])];
  h[hi].pagos=(h[hi].pagos||[]).filter((_,j)=>j!==mi);
  if(h[hi].pagos.length===0)h[hi].estado="pendiente";
  await updateDoc(doc(db,"clientes",cid),{honorarios:h});
  toast("🗑 Pago eliminado");
};
window.eliminarHonorario=async(cid,i)=>{
  if(!confirm("¿Eliminar este honorario?"))return;
  const c=S.clientes.find(x=>x._id===cid);
  const h=(c.honorarios||[]).filter((_,j)=>j!==i);
  await updateDoc(doc(db,"clientes",cid),{honorarios:h});
  toast("🗑 Honorario eliminado");
};

// ── BACKUP AUTOMÁTICO ────────────────────────────────────────────
function checkAutoBackup(){
  const last=localStorage.getItem("jp_last_backup");
  const now=Date.now();
  if(!last||now-parseInt(last)>7*24*60*60*1000){
    setTimeout(()=>{
      if(S.clientes.length>0){
        exportarDatos();
        localStorage.setItem("jp_last_backup",now.toString());
        toast("💾 Backup automático semanal generado",4000);
      }
    },3000);
  }
}
function exportarDatos(){
  const datos=JSON.stringify(S.clientes);
  const fecha=hoy();
  const blob=new Blob([datos],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=`cuentaclientes_backup_${fecha}.json`;
  a.click();
}

window.generarReporte=()=>{

  const totalCobrado=S.clientes.reduce((a,c)=>a+(c.honorarios||[]).reduce((b,h)=>b+(h.pagos||[]).length*(parseFloat(h.valor)||0),0),0);
  const totalPendiente=S.clientes.reduce((a,c)=>a+(c.honorarios||[]).filter(h=>h.estado!=="pagado"&&(h.pagos||[]).length===0).reduce((b,h)=>b+(parseFloat(h.valor)||0),0),0);

  const clientesHtml=S.clientes.map(c=>{

    const honorPendientes=(c.honorarios||[]).filter(h=>h.estado!=="pagado"||(h.pagos||[]).length===0);

      </div>
      ${honorPagados.length>0?`<div style="margin-bottom:8px">
        <div style="font-size:11px;font-weight:600;color:#27500A;margin-bottom:4px">✅ HONORARIOS PAGADOS</div>
        <table class="pdf-tabla"><tr><th>Concepto</th><th>Frecuencia</th><th>Valor</th><th>Meses pagados</th></tr>
        ${honorPagados.map(h=>`<tr><td>${escH(h.concepto)}</td><td>${escH(h.frecuencia||"")}</td><td>$${(parseFloat(h.valor)||0).toLocaleString("es-CO")}</td><td>${(h.pagos||[]).map(p=>p.mes).join(", ")}</td></tr>`).join("")}
        </table></div>`:""}
      ${honorPendientes.length>0?`<div style="margin-bottom:8px">
        <div style="font-size:11px;font-weight:600;color:#633806;margin-bottom:4px">⏳ HONORARIOS PENDIENTES</div>
        <table class="pdf-tabla"><tr><th>Concepto</th><th>Frecuencia</th><th>Valor</th></tr>
        ${honorPendientes.map(h=>`<tr><td>${escH(h.concepto)}</td><td>${escH(h.frecuencia||"")}</td><td>$${(parseFloat(h.valor)||0).toLocaleString("es-CO")}</td></tr>`).join("")}

  const reportHtml=`<div class="pdf-report">
    <div class="pdf-header">

      <div style="font-size:12px;color:#888;margin-top:4px">${MESES_N[mes]} ${anio} · Generado: ${new Date().toLocaleDateString("es-CO")}</div>

    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:20px;text-align:center">
      <div style="border:1px solid #e0e0dc;border-radius:8px;padding:10px">
        <div style="font-size:11px;color:#888">Total clientes</div>
        <div style="font-size:22px;font-weight:700;color:#1D9E75">${S.clientes.length}</div>
      </div>

        <div style="font-size:11px;color:#888">Total cobrado</div>

  const tmp=document.createElement("div");
  tmp.innerHTML=reportHtml;
  tmp.style.position="fixed";tmp.style.left="-9999px";
  document.body.appendChild(tmp);
  const opt={margin:8,filename:`reporte_${MESES_N[mes]}_${anio}.pdf`,image:{type:"jpeg",quality:0.95},html2canvas:{scale:1.5},jsPDF:{unit:"mm",format:"a4",orientation:"portrait"}};
  toast("⏳ Generando reporte...");
  closeModal();
  html2pdf().set(opt).from(tmp).save().then(()=>{document.body.removeChild(tmp);toast("✅ Reporte descargado");});

function getAlertas(){
  const alerts=[];
  S.clientes.forEach(c=>{
    (c.obligaciones||[]).forEach(o=>{
      if(o.fecha&&o.estado==="pendiente"){const d=diasHasta(o.fecha);if(d<=15)alerts.push({tipo:d<=3?"danger":"warning",msg:c.nombre+": "+o.tipo+" vence en "+d+" día"+(d===1?"":"s"),fecha:o.fecha});}
    });
    (c.documentos||[]).forEach(d=>{
      if(d.vencimiento&&d.estado!=="no aplica"){const dd=diasHasta(d.vencimiento);if(dd<=15)alerts.push({tipo:dd<=3?"danger":"warning",msg:c.nombre+": "+d.nombre+" vence en "+dd+" día"+(dd===1?"":"s"),fecha:d.vencimiento});}
    });
  });
  return alerts.sort((a,b)=>a.fecha>b.fecha?1:-1);
}

function renderDashboard(){
  const total=S.clientes.length;
  const activos=S.clientes.filter(c=>c.estado==="activo").length;
  const naturales=S.clientes.filter(c=>c.tipo==="natural").length;
  const empresas=S.clientes.filter(c=>c.tipo==="empresa").length;
  const pendOblig=S.clientes.reduce((a,c)=>a+(c.obligaciones||[]).filter(o=>o.estado==="pendiente").length,0);
  const pendDocs=S.clientes.reduce((a,c)=>a+(c.documentos||[]).filter(d=>d.estado==="pendiente").length,0);
  const honorTotal=S.clientes.reduce((a,c)=>a+(c.honorarios||[]).reduce((b,h)=>b+(h.pagos||[]).length*(parseFloat(h.valor)||0),0),0);
  const alertas=getAlertas();
  const proxVenc=S.clientes.flatMap(c=>[
    ...(c.obligaciones||[]).filter(o=>o.fecha&&o.estado==="pendiente").map(o=>({nombre:o.tipo,fecha:o.fecha,cliente:c.nombre})),

  ]).filter(x=>x.fecha>=hoy()).sort((a,b)=>a.fecha>b.fecha?1:-1).slice(0,6);

  return`<div class="topbar"><h2 style="margin:0">Dashboard</h2>
    <span style="font-size:12px;color:var(--text3)">${new Date().toLocaleDateString("es-CO",{weekday:"long",year:"numeric",month:"long",day:"numeric"})}</span>
  </div>
  ${alertas.slice(0,3).map(a=>`<div class="alert-banner ${a.tipo==="danger"?"danger":""}">⚠️ ${escH(a.msg)}</div>`).join("")}
  <div class="grid4" style="margin-bottom:20px">
    <div class="metric-card"><div class="lbl">Total clientes</div><div style="font-size:28px;font-weight:600;color:var(--green)">${total}</div><div style="font-size:11px;color:var(--text3)">${activos} activos</div></div>
    <div class="metric-card"><div class="lbl">Naturales / Empresas</div><div style="font-size:28px;font-weight:600;color:var(--blue-dark)">${naturales}</div><div style="font-size:11px;color:var(--text3)">${empresas} empresas</div></div>
    <div class="metric-card"><div class="lbl">Obligaciones pendientes</div><div style="font-size:28px;font-weight:600;color:${pendOblig>0?"#E24B4A":"var(--green)"}">${pendOblig}</div><div style="font-size:11px;color:var(--text3)">${pendDocs} docs pendientes</div></div>
    <div class="metric-card"><div class="lbl">Total cobrado</div><div style="font-size:22px;font-weight:600;color:var(--green)">$${honorTotal.toLocaleString("es-CO")}</div><div style="font-size:11px;color:var(--text3)">honorarios</div></div>
  </div>
  <div class="grid2">
    <div class="card"><div class="section-title">📅 Próximos vencimientos</div>
      ${proxVenc.length===0?`<div style="font-size:12px;color:var(--text3)">Sin vencimientos próximos 🎉</div>`:""}
      ${proxVenc.map(v=>{const d=diasHasta(v.fecha);return`<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:0.5px solid var(--border)">
        <div><div style="font-size:12px;font-weight:500">${escH(v.cliente)}</div><div style="font-size:11px;color:var(--text3)">${escH(v.nombre)}</div></div>
        <span class="badge ${d<=3?"badge-vencido":d<=7?"badge-pendiente":"badge-vigente"}">${d<=0?"Hoy":d===1?"Mañana":d+" días"}</span>
      </div>`;}).join("")}
    </div>
    <div class="card"><div class="section-title">👥 Últimos clientes</div>
      ${S.clientes.slice(-5).reverse().map(c=>`<div class="client-row" style="margin-bottom:4px;padding:8px 10px" onclick="verDetalle('${escA(c._id)}')">

      </div>`).join("")}
    </div>
  </div>`;
}

function renderCalendario(){
  const mes=S.calMes,anio=S.calAnio;
  const primerDia=new Date(anio,mes,1).getDay();
  const diasMes=new Date(anio,mes+1,0).getDate();
  const eventos={};
  S.clientes.forEach(c=>{
    (c.obligaciones||[]).forEach(o=>{
      if(o.fecha&&o.fecha.startsWith(anio+"-"+String(mes+1).padStart(2,"0"))){
        const d=parseInt(o.fecha.slice(8));
        if(!eventos[d])eventos[d]=[];
        eventos[d].push({txt:c.nombre+": "+o.tipo,estado:o.estado});
      }
    });
    (c.documentos||[]).forEach(dd=>{
      if(dd.vencimiento&&dd.vencimiento.startsWith(anio+"-"+String(mes+1).padStart(2,"0"))){
        const d=parseInt(dd.vencimiento.slice(8));
        if(!eventos[d])eventos[d]=[];
        eventos[d].push({txt:c.nombre+": "+dd.nombre,estado:dd.estado});
      }
    });
  });
  const hoyDate=new Date();
  const diaHoy=(hoyDate.getMonth()===mes&&hoyDate.getFullYear()===anio)?hoyDate.getDate():null;
  let celdas="";
  for(let i=0;i<primerDia;i++)celdas+=`<div class="cal-day other-month"></div>`;
  for(let d=1;d<=diasMes;d++){
    const evs=eventos[d]||[];
    celdas+=`<div class="cal-day ${d===diaHoy?"today":""}">
      <div style="font-size:11px;font-weight:${d===diaHoy?"700":"400"};color:${d===diaHoy?"var(--green)":"var(--text3)"};margin-bottom:2px">${d}</div>
      ${evs.slice(0,2).map(e=>`<div class="cal-event ${e.estado==="vencido"?"vence":""}">${escH(e.txt)}</div>`).join("")}
      ${evs.length>2?`<div style="font-size:9px;color:var(--text3)">+${evs.length-2} más</div>`:""}
    </div>`;
  }
  const alertas=getAlertas();
  return`<div class="topbar"><h2 style="margin:0">📅 Calendario de vencimientos</h2></div>
  ${alertas.length>0?`<div class="alert-banner">⚠️ ${alertas.length} vencimiento${alertas.length>1?"s":""} en los próximos 15 días</div>`:""}
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <button class="btn" onclick="cambiarMes(-1)">← Anterior</button>
    <span style="font-size:15px;font-weight:500">${MESES_N[mes]} ${anio}</span>
    <button class="btn" onclick="cambiarMes(1)">Siguiente →</button>
  </div>
  <div class="cal-header">${DIAS.map(d=>`<span>${d}</span>`).join("")}</div>
  <div class="cal-grid">${celdas}</div>
  ${alertas.length>0?`<div class="card" style="margin-top:16px"><div class="section-title">⚠️ Alertas</div>
    ${alertas.map(a=>`<div class="alert-banner ${a.tipo==="danger"?"danger":""}" style="margin-bottom:6px">${escH(a.msg)}</div>`).join("")}
  </div>`:""}`;
}
window.cambiarMes=(dir)=>{let m=S.calMes+dir,a=S.calAnio;if(m>11){m=0;a++;}if(m<0){m=11;a--;}setState({calMes:m,calAnio:a});};

function renderCartera(){
  const totalCobrado=S.clientes.reduce((a,c)=>a+(c.honorarios||[]).reduce((b,h)=>b+(h.pagos||[]).length*(parseFloat(h.valor)||0),0),0);
  const clientesConH=S.clientes.filter(c=>(c.honorarios||[]).length>0);
  const [filtro,setFiltro]=[S.cartFiltro||"todos",v=>setState({cartFiltro:v})];
  const [busq,setBusq]=[S.cartBusq||"",v=>setState({cartBusq:v})];
  const clientesFiltrados=clientesConH.filter(c=>{
    const matchBusq=c.nombre.toLowerCase().includes(busq.toLowerCase())||(c.nitCedula||"").includes(busq);
    const matchFiltro=filtro==="todos"||
      (filtro==="pagados"&&(c.honorarios||[]).some(h=>(h.pagos||[]).length>0))||
      (filtro==="pendientes"&&(c.honorarios||[]).some(h=>h.estado!=="pagado"));
    return matchBusq&&matchFiltro;
  });

  return`<div class="topbar"><h2 style="margin:0">💰 Cartera de cobros</h2></div>
  <div class="grid3" style="margin-bottom:16px">
    <div class="metric-card"><div class="lbl">Total cobrado</div><div style="font-size:22px;font-weight:600;color:var(--green)">$${totalCobrado.toLocaleString("es-CO")}</div></div>
    <div class="metric-card"><div class="lbl">Clientes con honorarios</div><div style="font-size:22px;font-weight:600;color:var(--blue-dark)">${clientesConH.length}</div></div>

        <div><span style="font-size:13px;font-weight:500">${escH(h.concepto)}</span>
          <span style="font-size:11px;color:var(--text3);margin-left:6px">${escH(h.frecuencia||"")} · $${(parseFloat(h.valor)||0).toLocaleString("es-CO")}</span>
        </div>
        <button onclick="registrarPagoMes('${escA(c._id)}',${i})" style="padding:4px 10px;border-radius:6px;border:none;cursor:pointer;font-size:12px;background:var(--green-light);color:var(--green-dark)">+ Pago</button>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:4px">
        ${(h.pagos||[]).length===0?`<span style="font-size:11px;color:var(--text3)">Sin pagos registrados</span>`:""}
        ${(h.pagos||[]).map((p,mi)=>`<div class="pago-chip"><span>✅ ${escH(p.mes)}</span><button onclick="eliminarPagoMes('${escA(c._id)}',${i},${mi})">✕</button></div>`).join("")}
      </div>
      ${(h.pagos||[]).length>0?`<div style="font-size:11px;color:var(--text3);margin-top:6px">${(h.pagos||[]).length} pago(s) · <b style="color:var(--green-dark)">$${((h.pagos||[]).length*(parseFloat(h.valor)||0)).toLocaleString("es-CO")}</b></div>`:""}
    </div>`).join("")}
  </div>`).join("")}`;
}

function renderLista(){
  const{clientes,busqueda,filtroTipo}=S;
  const q=busqueda.toLowerCase();
  const f=clientes.filter(c=>(c.nombre.toLowerCase().includes(q)||(c.nitCedula||"").includes(q)||(c.email||"").toLowerCase().includes(q))&&(filtroTipo==="todos"||c.tipo===filtroTipo));
  const empresas=f.filter(c=>c.tipo==="empresa");
  const naturales=f.filter(c=>c.tipo==="natural");
  const rows=f.length===0
    ?`<div class="empty"><div style="font-size:40px;margin-bottom:12px">📂</div><div>${clientes.length===0?"Aún no tienes clientes":"No se encontraron resultados"}</div></div>`
    :((filtroTipo==="todos"||filtroTipo==="empresa")&&empresas.length>0?`<div class="section-label">Empresas (${empresas.length})</div>${empresas.map(clienteRow).join("")}`:"")
    +((filtroTipo==="todos"||filtroTipo==="natural")&&naturales.length>0?`<div class="section-label" style="margin-top:12px">Personas Naturales (${naturales.length})</div>${naturales.map(clienteRow).join("")}`:"");
  return`<div class="topbar">
    <div><h2 style="margin:0">Mis Clientes</h2><span style="font-size:12px;color:var(--text3)">${clientes.length} registrados</span></div>
    <button class="btn btn-green" onclick="goNuevo()">+ Nuevo cliente</button>
  </div>
  <div class="search-row">
    <input placeholder="🔍 Buscar por nombre, NIT, cédula o correo..." value="${escH(busqueda)}" oninput="setState({busqueda:this.value})"/>
    <select onchange="setState({filtroTipo:this.value})">
      <option value="todos" ${filtroTipo==="todos"?"selected":""}>Todos</option>
      <option value="natural" ${filtroTipo==="natural"?"selected":""}>Persona Natural</option>
      <option value="empresa" ${filtroTipo==="empresa"?"selected":""}>Empresa</option>
    </select>
  </div>${rows}`;
}

function clienteRow(c){
  const pend=[...(c.documentos||[]),...(c.obligaciones||[])].filter(x=>x.estado==="pendiente"||x.estado==="vencido").length;
  const honorPend=(c.honorarios||[]).filter(h=>h.estado!=="pagado").length;
  return`<div class="client-row" onclick="verDetalle('${escA(c._id)}')">
    ${avatar(c)}
    <div style="flex:1;min-width:0">
      <div style="font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escH(c.nombre)||"Sin nombre"}</div>
      <div style="font-size:11px;color:var(--text3)">${c.tipo==="natural"?"CC":"NIT"}: ${escH(c.nitCedula)||"—"}${c.categoria?" · "+c.categoria:""}</div>
    </div>
    <div style="display:flex;gap:5px;align-items:center;flex-shrink:0;flex-wrap:wrap">
      ${pend>0?`<span class="badge badge-pendiente">${pend} pend.</span>`:""}
      ${honorPend>0?`<span class="badge badge-pendiente">💰${honorPend}</span>`:""}
      ${badge(c.estado)}<span style="color:var(--border);font-size:16px">›</span>
    </div>
  </div>`;
}

function renderDetalle(){

  const credHtml=(c.credenciales||[]).length>0?`<div style="margin-bottom:14px">
    <div class="section-title">🔑 Credenciales</div>

      <div style="flex:1;min-width:110px"><div class="lbl">Contraseña</div>
        <div style="display:flex;align-items:center;gap:6px">

        </div></div>

      <div style="font-size:13px;font-weight:500;margin-bottom:4px">${escH(d.nombre)}</div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">${badge(d.estado)}

      </div>
      ${d.numero?`<div style="font-size:11px;color:var(--text3);margin-bottom:4px">N°: ${escH(d.numero)}</div>`:""}

            <a href="${escH(d.archivoUrl)}" target="_blank" style="flex:1;text-align:center;padding:5px;background:var(--blue-light);color:var(--blue-dark);border-radius:6px;font-size:11px;font-weight:500;text-decoration:none">👁 Ver</a>
            <a href="${escH(d.archivoUrl)}" download style="flex:1;text-align:center;padding:5px;background:var(--green-light);color:var(--green-dark);border-radius:6px;font-size:11px;font-weight:500;text-decoration:none">⬇️</a>
            <button onclick="eliminarArchivoDoc('${escA(c._id)}',${di},'${escA(d.archivoPath||"")}')" style="padding:5px 7px;background:var(--red-light);color:var(--red);border:none;border-radius:6px;font-size:11px;cursor:pointer">🗑</button>
          </div>`
        :`<label class="upload-area" style="margin-top:4px;padding:6px" onclick="document.getElementById('df_${escA(c._id)}_${di}').click()">📎 Adjuntar</label>
          <input type="file" id="df_${escA(c._id)}_${di}" style="display:none" accept=".pdf,.jpg,.jpeg,.png" onchange="subirArchivoDoc('${escA(c._id)}',${di},this)"/>`}
    </div>`).join("")}</div></div>`:"";

  const obligHtml=(c.obligaciones||[]).length>0?`<div style="margin-bottom:14px">
    <div class="section-title">📋 Obligaciones fiscales</div>
    <div class="grid2">${(c.obligaciones||[]).map(o=>`<div class="card" style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
      <div><div style="font-size:13px;font-weight:500">${escH(o.tipo)}</div>
        <div style="font-size:11px;color:var(--text3);margin-top:2px">${o.periodo?"Período: "+o.periodo:""}${o.fecha?" · "+o.fecha:""}</div>
      </div>${badge(o.estado)}
    </div>`).join("")}</div></div>`:"";

  const honorHtml=`<div style="margin-bottom:14px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <div class="section-title" style="margin:0">💰 Honorarios</div>
      <button class="btn" style="font-size:12px;padding:3px 10px" onclick="agregarHonorario('${escA(c._id)}')">+ Agregar</button>
    </div>
    ${(c.honorarios||[]).length===0?`<div style="font-size:12px;color:var(--text3)">Sin registros de honorarios.</div>`:""}
    ${(c.honorarios||[]).map((h,i)=>`<div class="card" style="margin-bottom:8px">
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:${(h.pagos||[]).length>0?"10px":"0"}">
        <div>
          <div style="font-size:13px;font-weight:600">${escH(h.concepto)}</div>
          <div style="font-size:11px;color:var(--text3)">${escH(h.frecuencia||"única vez")} · $${(parseFloat(h.valor)||0).toLocaleString("es-CO")}</div>
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
          ${badge(h.estado==="pagado"?"pagado":"pendiente")}
          <button onclick="registrarPagoMes('${escA(c._id)}',${i})" style="padding:4px 10px;border-radius:6px;border:none;cursor:pointer;font-size:12px;background:var(--green-light);color:var(--green-dark)">+ Registrar pago</button>
          <button onclick="eliminarHonorario('${escA(c._id)}',${i})" style="padding:4px 8px;border-radius:6px;border:none;cursor:pointer;font-size:12px;background:var(--red-light);color:var(--red)">🗑</button>
        </div>
      </div>
      ${(h.pagos||[]).length>0?`<div style="border-top:0.5px solid var(--border);padding-top:8px">
        <div style="font-size:11px;color:var(--text3);margin-bottom:6px;font-weight:500">PAGOS REGISTRADOS</div>
        <div style="display:flex;flex-wrap:wrap;gap:5px">
          ${(h.pagos||[]).map((p,mi)=>`<div class="pago-chip"><span>✅ ${escH(p.mes)}</span><button onclick="eliminarPagoMes('${escA(c._id)}',${i},${mi})">✕</button></div>`).join("")}
        </div>
        <div style="font-size:11px;color:var(--text3);margin-top:6px">Total: <b style="color:var(--green-dark)">$${((h.pagos||[]).length*(parseFloat(h.valor)||0)).toLocaleString("es-CO")}</b></div>
      </div>`:""}
    </div>`).join("")}
  </div>`;

  const recHtml=(c.recordatorios||[]).length>0?`<div style="margin-bottom:14px">
    <div class="section-title">🔔 Recordatorios</div>
    ${(c.recordatorios||[]).sort((a,b)=>a.fecha>b.fecha?1:-1).map(r=>`<div class="card" style="display:flex;justify-content:space-between;align-items:center;gap:8px">
      <div><span style="font-size:13px">${escH(r.texto)}</span>${r.mensual?`<span class="badge badge-mensual" style="margin-left:6px">🔁</span>`:""}</div>
      <span style="font-size:12px;color:${r.fecha&&r.fecha<hoy()?"var(--red)":"var(--text3)"}">${r.fecha||""}</span>
    </div>`).join("")}</div>`:"";

  const histHtml=(c.historial||[]).length>0?`<div style="margin-bottom:14px">
    <div class="section-title">📜 Historial de cambios</div>
    ${[...(c.historial||[])].reverse().slice(0,5).map(h=>`<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:0.5px solid var(--border);font-size:12px">
      <span>${escH(h.accion)}</span><span style="color:var(--text3)">${h.fecha?new Date(h.fecha).toLocaleString("es-CO"):""}</span>
    </div>`).join("")}</div>`:"";

  const notasHtml=c.notas?`<div class="card" style="margin-bottom:14px">
    <div class="section-title">📝 Notas</div>
    <div style="font-size:13px;color:var(--text2);white-space:pre-wrap">${escH(c.notas)}</div>
  </div>`:"";

  return`<div id="fichaCliente">

      <button class="back-btn" onclick="goBack()">←</button>
      <div style="flex:1">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          <span style="font-size:16px;font-weight:600">${escH(c.nombre)}</span>
          ${badge(c.estado)}<span class="badge badge-tipo">${c.tipo==="natural"?"Persona Natural":"Empresa"}</span>
          ${c.categoria?`<span class="tag">${escH(c.categoria)}</span>`:""}
        </div>
        <div style="font-size:12px;color:var(--text3)">${c.tipo==="natural"?"CC":"NIT"}: ${escH(c.nitCedula)}</div>
      </div>
      <button class="btn" onclick="compartirFicha('${escA(c._id)}')" style="font-size:12px;margin-right:4px">📲 WhatsApp</button>
      <button class="btn" onclick="exportarPDF('${escA(c._id)}')" style="font-size:12px;margin-right:4px">📄 PDF</button>

    </div>
    ${credHtml}${docHtml}${obligHtml}${honorHtml}${recHtml}${notasHtml}${histHtml}
  </div>`;
}

window.exportarPDF=(cid)=>{
  const c=S.clientes.find(x=>x._id===cid);if(!c)return;
  const el=document.getElementById("fichaCliente");
  const opt={margin:10,filename:c.nombre.replace(/\s+/g,"_")+"_ficha.pdf",image:{type:"jpeg",quality:0.95},html2canvas:{scale:2},jsPDF:{unit:"mm",format:"a4",orientation:"portrait"}};
  toast("⏳ Generando PDF...");
  html2pdf().set(opt).from(el).save().then(()=>toast("✅ PDF descargado"));
};

function renderForm(esEditar){

  const credRows=(c.credenciales||[]).map((cr,i)=>`<div class="row">

    <div style="flex:1;min-width:110px"><div class="lbl">Vencimiento</div><input type="date" value="${d.vencimiento||""}" oninput="updateForm('documentos',${i},'vencimiento',this.value)"/></div>
    <div style="flex:1;min-width:80px"><div class="lbl">Número</div><input value="${escH(d.numero||"")}" oninput="updateForm('documentos',${i},'numero',this.value)" placeholder="Opcional"/></div>

    <div style="flex:1;min-width:90px"><div class="lbl">Estado</div><select onchange="updateForm('obligaciones',${i},'estado',this.value)">${OBLIG_EST.map(s=>`<option value="${s}" ${o.estado===s?"selected":""}>${s}</option>`).join("")}</select></div>

      <div><div class="lbl">Categoría</div><select onchange="updateFormField('categoria',this.value)">
        <option value="">Sin categoría</option>${CATEGORIAS.map(cat=>`<option value="${cat}" ${c.categoria===cat?"selected":""}>${cat}</option>`).join("")}</select></div>
      <div style="grid-column:1/-1"><div class="lbl">Dirección</div><input value="${escH(c.direccion)}" oninput="updateFormField('direccion',this.value)"/></div>
    </div>
    <div style="margin-bottom:16px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div class="section-title">🔑 Credenciales</div>
        <button class="btn" style="font-size:12px;padding:3px 10px" onclick="addToArray('credenciales',{plataforma:'',usuario:'',contrasena:''})">+ Agregar</button></div>
      ${credRows}</div>
    <div style="margin-bottom:16px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div class="section-title">📁 Documentos legales</div>
        <div style="display:flex;gap:6px">
          <button class="btn" style="font-size:12px;padding:3px 10px" onclick="agregarDocsPred()">📋 Predefinidos</button>
          <button class="btn" style="font-size:12px;padding:3px 10px" onclick="addToArray('documentos',{nombre:'',estado:'pendiente',vencimiento:'',numero:''})">+ Nuevo</button></div></div>
      ${docRows||`<div style="font-size:12px;color:var(--text3);padding:6px 0">Usa "Predefinidos" para agregar los más comunes.</div>`}</div>
    <div style="margin-bottom:16px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div class="section-title">📋 Obligaciones fiscales</div>
        <button class="btn" style="font-size:12px;padding:3px 10px" onclick="addToArray('obligaciones',{tipo:'',periodo:'',fecha:'',estado:'pendiente'})">+ Agregar</button></div>
      ${obligRows}</div>
    <div style="margin-bottom:16px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div class="section-title">🔔 Recordatorios</div>
        <button class="btn" style="font-size:12px;padding:3px 10px" onclick="addToArray('recordatorios',{texto:'',fecha:'',mensual:false})">+ Agregar</button></div>
      <div style="font-size:11px;color:var(--text3);margin-bottom:6px">Activa 🔁 para que se repita cada mes.</div>
      ${recRows}</div>
    <div style="margin-bottom:20px"><div class="lbl">📝 Notas</div>
      <textarea oninput="updateFormField('notas',this.value);S.formDirty=true">${escH(c.notas)}</textarea></div>
    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button class="btn" onclick="goBack()">Cancelar</button>
      <button class="btn btn-green" onclick="guardarCliente()">Guardar cliente</button></div>`;
}

// ── ACCIONES ─────────────────────────────────────────────────────
window.setState=setState;
window.goNuevo=()=>{
  formData={tipo:"natural",nombre:"",nitCedula:"",contacto:"",email:"",direccion:"",estado:"activo",categoria:"",credenciales:[],documentos:[],obligaciones:[],notas:"",recordatorios:[],honorarios:[],historial:[]};
  S.formDirty=false;setState({vista:"nuevo"});
};
window.goEditar=()=>{formData=JSON.parse(JSON.stringify(S.seleccionado));S.formDirty=false;setState({vista:"editar"});};
window.goBack=()=>{
  if(S.formDirty&&!confirm("¿Salir sin guardar? Los cambios se perderán."))return;
  S.formDirty=false;
  setState({vista:S.seleccionado?"detalle":"lista"});
};
window.verDetalle=(id)=>{
  const c=S.clientes.find(x=>x._id===id);if(!c)return;
  const h=hoy();let changed=false;
  (c.recordatorios||[]).forEach(r=>{if(r.mensual&&r.fecha&&r.fecha<h){const d=new Date(r.fecha);d.setMonth(d.getMonth()+1);r.fecha=d.toISOString().slice(0,10);changed=true;}});
  if(changed)updateDoc(doc(db,"clientes",id),{recordatorios:c.recordatorios});
  setState({seleccionado:c,vista:"detalle"});
};
window.confirmarEliminar=(id)=>{if(!confirm("¿Eliminar este cliente? Esta acción no se puede deshacer."))return;deleteCliente(id);};
window.guardarCliente=async()=>{if(!formData.nombre.trim()){alert("El nombre es obligatorio.");return;}await saveCliente(formData);};
window.updateFormField=(k,v)=>{formData[k]=v;};
window.updateForm=(arr,i,k,v)=>{formData[arr][i][k]=v;};
window.addToArray=(arr,obj)=>{formData[arr].push(obj);render();};
window.removeFromArray=(arr,i)=>{formData[arr].splice(i,1);render();};
window.agregarDocsPred=()=>{
  const ex=(formData.documentos||[]).map(d=>d.nombre);
  const nuevos=DOCS_PRED.filter(n=>!ex.includes(n)).map(n=>({nombre:n,estado:"pendiente",vencimiento:"",numero:""}));
  if(!nuevos.length){alert("Ya tienes todos los predefinidos.");return;}
  formData.documentos=[...(formData.documentos||[]),...nuevos];render();
};
window.togglePass=(i,pass)=>{
  const el=document.getElementById("pass_"+i);if(!el)return;
  if(el.dataset.shown==="1"){el.textContent="••••••••";el.style.letterSpacing="2px";el.dataset.shown="0";}
  else{el.textContent=pass;el.style.letterSpacing="0";el.dataset.shown="1";}
};
window.toggleFormPass=(id)=>{const inp=document.getElementById(id);if(inp)inp.type=inp.type==="password"?"text":"password";};
</script>
</body>
</html>
